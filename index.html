<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>틱톡 라이브 셀러 마켓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
        .active-tab { background-color: #111827; color: white; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .inactive-tab { background-color: white; color: #94a3b8; border: 1px solid #e2e8f0; }
        .size-checked { background-color: #ec4899; border-color: #ec4899; color: white; box-shadow: 0 4px 6px -1px rgba(236, 72, 153, 0.3); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="app" class="min-h-screen">
        <!-- 로딩 화면 -->
        <div id="loading-screen" class="fixed inset-0 z-[200] bg-white flex flex-col items-center justify-center">
            <div class="relative">
                <div class="w-16 h-16 border-4 border-pink-100 border-t-pink-500 rounded-full animate-spin"></div>
                <i data-lucide="warehouse" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-pink-500 w-6 h-6"></i>
            </div>
            <p class="mt-6 font-black text-slate-400 animate-pulse">데이터 동기화 중...</p>
        </div>

        <!-- 알림 UI -->
        <div id="notification-container" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[300] hidden transition-all duration-300">
            <div class="flex items-center gap-3 px-8 py-4 rounded-[2rem] shadow-2xl border" id="notification-box">
                <i data-lucide="bell" class="w-5 h-5"></i>
                <span id="notification-msg" class="font-black text-sm"></span>
            </div>
        </div>

        <!-- 메인 콘텐츠 영역 -->
        <div id="main-view"></div>
    </div>

    <script>
        // [필독] Firebase 콘솔에서 발급받은 실제 정보를 아래에 입력하세요.
        const firebaseConfig = {
            apiKey: "본인의_API_KEY",
            authDomain: "본인의_PROJECT_ID.firebaseapp.com",
            projectId: "본인의_PROJECT_ID",
            storageBucket: "본인의_PROJECT_ID.appspot.com",
            messagingSenderId: "본인의_SENDER_ID",
            appId: "본인의_APP_ID"
        };

        // Firebase 초기화 시도
        try {
            firebase.initializeApp(firebaseConfig);
            var db = firebase.firestore();
            var auth = firebase.auth();
        } catch (err) {
            console.error("Firebase Init Error:", err);
            document.body.innerHTML = `<div class="p-10 text-center font-bold text-red-500">Firebase 설정이 올바르지 않습니다. 코드를 확인해 주세요.</div>`;
        }

        const APP_ID = "tiktok-live-order-manager";

        // 전역 상태
        let state = {
            view: 'customer', // customer, admin, login
            customerTab: 'shop',
            marketId: 'default-warehouse',
            marketName: '기본 창고',
            products: [],
            orders: [],
            registeredMarkets: [],
            marketSettings: { 
                bankName: '카카오뱅크', 
                accountNum: '', 
                accountHolder: '', 
                liveStartTime: null, 
                liveDurationMs: 4 * 3600000, 
                isLiveActive: false, 
                gasUrl: '', 
                adminKey: '1234' 
            },
            cart: [],
            selectedSizes: {},
            lookupInfo: { name: '', phone: '' },
            hasSearched: false,
            timeLeft: null,
            inputDuration: 4
        };

        function notify(msg, type = 'info') {
            const container = document.getElementById('notification-container');
            const box = document.getElementById('notification-box');
            const msgSpan = document.getElementById('notification-msg');
            
            msgSpan.innerText = msg;
            box.className = `flex items-center gap-3 px-8 py-4 rounded-[2rem] shadow-2xl border ${
                type === 'error' ? 'bg-red-50 text-red-600 border-red-100' : 
                type === 'success' ? 'bg-green-50 text-green-600 border-green-100' : 
                'bg-slate-900 text-white'
            }`;
            
            container.classList.remove('hidden');
            setTimeout(() => container.classList.add('hidden'), 3000);
        }

        function formatTime(ms) {
            if (ms === null || ms < 0) return "00:00:00";
            const h = Math.floor(ms / 3600000);
            const m = Math.floor((ms % 3600000) / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        async function syncWithGAS(data, type) {
            if (!state.marketSettings.gasUrl) return;
            try {
                await fetch(state.marketSettings.gasUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ ...data, type, warehouse: state.marketName, timestamp: new Date().toLocaleString() })
                });
            } catch (err) { console.error('GAS Sync Error', err); }
        }

        function initDataListeners() {
            // 창고 목록 구독
            db.collection('artifacts').doc(APP_ID).collection('registered_warehouses').onSnapshot(snap => {
                state.registeredMarkets = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                const curr = state.registeredMarkets.find(m => m.marketId === state.marketId);
                if (curr) state.marketName = curr.name;
                render();
            }, err => {
                if(err.code === 'permission-denied') notify("Firestore 보안 규칙을 설정해주세요!", "error");
            });

            // 상품 목록 구독
            db.collection('artifacts').doc(APP_ID).collection(`${state.marketId}_products`).onSnapshot(snap => {
                state.products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                document.getElementById('loading-screen').classList.add('hidden');
                render();
            });

            // 주문 목록 구독
            db.collection('artifacts').doc(APP_ID).collection(`${state.marketId}_orders`).onSnapshot(snap => {
                state.orders = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.timestamp - a.timestamp);
                render();
            });

            // 설정 정보 구독
            db.collection('artifacts').doc(APP_ID).collection('market_configs').doc(state.marketId).onSnapshot(doc => {
                if (doc.exists) state.marketSettings = { ...state.marketSettings, ...doc.data() };
                render();
            });
        }

        function render() {
            const main = document.getElementById('main-view');
            if (state.view === 'login') main.innerHTML = renderLoginView();
            else if (state.view === 'admin') main.innerHTML = renderAdminView();
            else main.innerHTML = renderCustomerView();
            lucide.createIcons();
        }

        function renderCustomerView() {
            const isMarketActive = state.marketSettings.isLiveActive && (state.timeLeft === null || state.timeLeft > 0);
            return `
                <div class="max-w-md mx-auto min-h-screen bg-slate-50 pb-32 text-slate-900 animate-in fade-in duration-300">
                    <header class="sticky top-0 z-40 bg-white/90 backdrop-blur-md px-6 py-4 border-b text-center">
                        <h1 class="text-xl font-black mb-1">라이브 셀러 마켓</h1>
                        <p class="text-[10px] text-slate-400 font-bold uppercase mb-2">${state.marketName}</p>
                        <div class="p-3 rounded-2xl flex items-center justify-between transition-all ${isMarketActive ? 'bg-pink-500 text-white shadow-lg shadow-pink-100' : 'bg-slate-200 text-slate-500'}">
                            <div class="flex items-center gap-2"><i data-lucide="timer" class="w-4 h-4"></i><span class="text-xs font-bold uppercase">${isMarketActive ? '주문 마감까지' : '라이브 준비 중'}</span></div>
                            <span id="countdown-timer" class="text-lg font-black font-mono">${formatTime(state.timeLeft)}</span>
                        </div>
                        <button onclick="state.view='login'; render();" class="absolute top-4 right-4 p-2 text-slate-300 hover:text-pink-500"><i data-lucide="settings" class="w-5 h-5"></i></button>
                    </header>

                    <div class="flex p-4 gap-2">
                        <button onclick="state.customerTab='shop'; render();" class="flex-1 py-3 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 ${state.customerTab === 'shop' ? 'active-tab' : 'inactive-tab'}"><i data-lucide="shopping-cart" class="w-4 h-4"></i> 쇼핑하기</button>
                        <button onclick="state.customerTab='lookup'; render();" class="flex-1 py-3 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 ${state.customerTab === 'lookup' ? 'active-tab' : 'inactive-tab'}"><i data-lucide="history" class="w-4 h-4"></i> 주문 조회</button>
                    </div>

                    <div class="px-4 space-y-4">
                        ${state.customerTab === 'shop' ? renderProductList() : renderOrderLookup()}
                    </div>
                </div>
            `;
        }

        function renderProductList() {
            if (state.products.length === 0) return `<div class="py-20 text-center text-slate-300 font-bold">등록된 상품이 없습니다.</div>`;
            return state.products.map(p => `
                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden mb-4">
                    ${p.imageUrls?.length > 0 ? `<img src="${p.imageUrls[0]}" class="h-72 w-full object-cover">` : ''}
                    <div class="p-6 space-y-4">
                        <div>
                            <span class="text-[10px] font-black text-slate-400 bg-slate-50 px-2 py-1 rounded-md uppercase tracking-wider">${p.category || '일반'}</span>
                            <div class="flex flex-wrap items-baseline gap-2 mt-2">
                                <h3 class="text-xl font-bold text-slate-800">${p.name}</h3>
                                ${p.color ? `<span class="text-xl font-bold text-pink-500">(${p.color})</span>` : ''}
                            </div>
                            <p class="text-pink-600 font-black text-2xl mt-1">${(p.price || 0).toLocaleString()}원</p>
                        </div>
                        <div class="space-y-3">
                            <div class="flex flex-wrap gap-2">
                                ${p.sizes?.map(s => `
                                    <button onclick="selectSize('${p.id}', '${s}')" class="flex-1 min-w-[80px] px-3 py-4 rounded-2xl text-xs font-bold border-2 transition-all ${state.selectedSizes[p.id] === s ? 'size-checked' : 'bg-white border-slate-100 text-slate-600'}">${s}</button>
                                `).join('')}
                            </div>
                            <button onclick="handleAddToCart('${p.id}')" class="w-full py-5 rounded-2xl font-black text-base flex items-center justify-center gap-2 bg-slate-900 text-white shadow-xl active:scale-95 transition-transform">장바구니 담기</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderOrderLookup() {
            return `
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 space-y-4">
                    <h3 class="font-black text-slate-800 text-lg flex items-center gap-2"><i data-lucide="user-check" class="text-pink-500"></i> 내 주문 조회</h3>
                    <input id="lookup-name" placeholder="입금자명" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" value="${state.lookupInfo.name}" />
                    <button onclick="handleLookup()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black">조회하기</button>
                </div>
                <div id="lookup-results" class="space-y-3">
                    ${state.hasSearched ? renderLookupResults() : ''}
                </div>
            `;
        }

        function renderLookupResults() {
            const myOrders = state.orders.filter(o => o.name === state.lookupInfo.name);
            if (myOrders.length === 0) return `<div class="py-10 text-center text-slate-400 font-bold">주문 내역이 없습니다.</div>`;
            return myOrders.map(o => `
                <div class="bg-white p-6 rounded-[2.5rem] border-2 border-pink-50 space-y-3">
                    <div class="flex justify-between items-center border-b pb-3">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black ${o.status === 'paid' ? 'bg-green-500 text-white' : 'bg-orange-400 text-white'}">${o.status === 'paid' ? '확인완료' : '입금대기'}</span>
                        <span class="text-xl font-black">${(o.totalAmount || 0).toLocaleString()}원</span>
                    </div>
                    <div class="text-xs text-slate-500 space-y-1">
                        ${o.items?.map(it => `<div>• ${it}</div>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderLoginView() {
            return `
                <div class="h-screen flex items-center justify-center bg-slate-900 p-6">
                    <div class="w-full max-w-sm bg-white rounded-[2.5rem] p-10 shadow-2xl space-y-8 text-center animate-in zoom-in duration-300">
                        <div class="w-20 h-20 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center mx-auto"><i data-lucide="lock" class="w-10 h-10"></i></div>
                        <h2 class="text-2xl font-black text-slate-800">관리자 인증</h2>
                        <input type="password" id="admin-pw" placeholder="비밀번호" class="w-full p-5 bg-slate-100 rounded-2xl text-center text-2xl font-black tracking-widest outline-none focus:ring-4 focus:ring-pink-200" />
                        <div class="flex gap-2">
                            <button onclick="state.view='customer'; render();" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">취소</button>
                            <button onclick="handleLogin()" class="flex-[2] py-4 bg-slate-900 text-white rounded-2xl font-black shadow-lg">인증하기</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAdminView() {
            return `
                <div class="max-w-7xl mx-auto p-4 md:p-10 space-y-8 bg-white min-h-screen text-slate-900 animate-in fade-in duration-500">
                    <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 border-b pb-8">
                        <div>
                            <h1 class="text-3xl font-black tracking-tighter">통합 관제 센터</h1>
                            <p class="text-slate-400 font-bold text-sm mt-2">현재 창고: ${state.marketName}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="state.view='customer'; render();" class="px-6 py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-black transition-all">고객 화면 보기</button>
                        </div>
                    </header>
                    <div class="grid lg:grid-cols-12 gap-8">
                        <div class="lg:col-span-4 space-y-6">
                            <div class="bg-slate-50 p-8 rounded-[2.5rem] space-y-6 border border-slate-100 shadow-sm">
                                <h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="plus-circle" class="text-pink-500"></i> 상품 등록</h2>
                                <input id="reg-name" placeholder="상품명" class="w-full p-4 bg-white rounded-2xl border outline-none" />
                                <div class="grid grid-cols-2 gap-2">
                                    <input id="reg-price" type="number" placeholder="가격" class="w-full p-4 bg-white rounded-2xl border outline-none" />
                                    <input id="reg-stock" type="number" placeholder="재고" class="w-full p-4 bg-white rounded-2xl border outline-none" />
                                </div>
                                <input id="reg-sizes" placeholder="사이즈 (쉼표 구분: S, M, L)" class="w-full p-4 bg-white rounded-2xl border outline-none" />
                                <button onclick="handleAddProduct()" class="w-full bg-pink-500 text-white p-5 rounded-2xl font-bold shadow-lg shadow-pink-100">등록하기</button>
                            </div>
                        </div>
                        <div class="lg:col-span-8 space-y-6">
                            <h2 class="text-2xl font-black flex items-center gap-2"><i data-lucide="clipboard-list" class="text-blue-500"></i> 주문 현황 (${state.orders.length})</h2>
                            <div id="admin-orders" class="grid md:grid-cols-2 gap-4">
                                ${renderAdminOrders()}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAdminOrders() {
            if (state.orders.length === 0) return `<div class="col-span-2 py-20 text-center text-slate-300 font-bold border-2 border-dashed rounded-[3rem]">주문 내역이 없습니다.</div>`;
            return state.orders.map(o => `
                <div class="p-6 rounded-[2.5rem] border-2 bg-white space-y-4 shadow-sm hover:shadow-xl transition-all">
                    <div class="flex justify-between">
                        <h3 class="text-xl font-black">${o.tiktokId || 'ID없음'}(${o.name || '무명'})</h3>
                        <span class="px-3 py-1 rounded-full text-[10px] font-black ${o.status === 'paid' ? 'bg-green-500 text-white' : 'bg-orange-400 text-white'}">${o.status === 'paid' ? '완료' : '대기'}</span>
                    </div>
                    <div class="bg-slate-900 text-white p-4 rounded-3xl text-xs font-medium space-y-1">
                        ${o.items?.map(it => `<div>• ${it}</div>`).join('')}
                        <p class="mt-3 text-pink-400 font-black text-lg text-right border-t border-slate-800 pt-2">${(o.totalAmount || 0).toLocaleString()}원</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleOrderStatus('${o.id}', '${o.status}')" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200">${o.status === 'paid' ? '취소' : '입금확인'}</button>
                        <button onclick="handleDeleteOrder('${o.id}')" class="p-4 bg-red-50 text-red-400 rounded-2xl"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function selectSize(pid, size) {
            state.selectedSizes[pid] = size;
            render();
        }

        function handleAddToCart(pid) {
            const size = state.selectedSizes[pid];
            if (!size) return notify("사이즈를 선택해주세요.", "error");
            const prod = state.products.find(p => p.id === pid);
            if (prod.stock <= 0) return notify("재고가 부족합니다.", "error");
            
            const itemString = `${prod.name}(${size})`;
            state.cart.push({ ...prod, selectedSize: size, quantity: 1, string: itemString });
            notify("장바구니에 담았습니다.", "success");
            
            // 주문서 작성 유도 (간소화된 흐름)
            if(confirm("주문서를 작성하시겠습니까?")) handlePlaceOrder();
        }

        async function handlePlaceOrder() {
            if(state.cart.length === 0) return;
            const tId = prompt("틱톡 아이디를 입력하세요 (필수)");
            const name = prompt("입금자명을 입력하세요 (실명 필수)");
            if(!tId || !name) return notify("정보를 모두 입력해야 합니다.", "error");

            const orderData = {
                tiktokId: tId,
                name: name,
                items: state.cart.map(i => i.string),
                totalAmount: state.cart.reduce((s, i) => s + i.price, 0),
                status: 'pending',
                timestamp: Date.now()
            };

            await db.collection('artifacts').doc(APP_ID).collection(`${state.marketId}_orders`).add(orderData);
            state.cart = [];
            notify("주문이 접수되었습니다!", "success");
            render();
        }

        function handleLogin() {
            const pw = document.getElementById('admin-pw').value;
            if (pw === state.marketSettings.adminKey) {
                state.view = 'admin';
                notify("인증 성공", "success");
                render();
            } else {
                notify("비밀번호 오류", "error");
            }
        }

        async function handleAddProduct() {
            const name = document.getElementById('reg-name').value;
            const price = Number(document.getElementById('reg-price').value);
            const stock = Number(document.getElementById('reg-stock').value);
            const sizes = document.getElementById('reg-sizes').value.split(',').map(s => s.trim()).filter(Boolean);
            
            if(!name || !price) return notify("이름과 가격을 입력하세요.", "error");

            const data = { name, price, stock, sizes, category: '의류', imageUrls: [], createdAt: Date.now() };
            await db.collection('artifacts').doc(APP_ID).collection(`${state.marketId}_products`).add(data);
            notify("상품 등록 완료", "success");
        }

        async function toggleOrderStatus(oid, curr) {
            const next = curr === 'paid' ? 'pending' : 'paid';
            await db.collection('artifacts').doc(APP_ID).collection(`${state.marketId}_orders`).doc(oid).update({ status: next });
        }

        async function handleDeleteOrder(oid) {
            if(!confirm("주문을 삭제하시겠습니까?")) return;
            await db.collection('artifacts').doc(APP_ID).collection(`${state.marketId}_orders`).doc(oid).delete();
            notify("삭제되었습니다.");
        }

        function handleLookup() {
            const name = document.getElementById('lookup-name').value;
            if(!name) return notify("이름을 입력하세요.", "error");
            state.lookupInfo.name = name;
            state.hasSearched = true;
            render();
        }

        // 초기화
        window.onload = () => {
            // 백스페이스 뒤로가기 방지
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) e.preventDefault();
            });

            auth.signInAnonymously().then(() => {
                initDataListeners();
            });

            setInterval(() => {
                if (state.marketSettings.isLiveActive && state.marketSettings.liveStartTime) {
                    const elapsed = Date.now() - state.marketSettings.liveStartTime;
                    state.timeLeft = state.marketSettings.liveDurationMs - elapsed;
                    const timerEl = document.getElementById('countdown-timer');
                    if (timerEl) timerEl.innerText = formatTime(state.timeLeft);
                }
            }, 1000);
        };
    </script>
</body>
</html>
