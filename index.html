<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사령관의 보급고 (COMMANDER SHOP)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #0f172a; color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .commander-card { background: #1e293b; border: 1px solid #334155; border-radius: 24px; overflow: hidden; transition: all 0.3s; }
        .commander-card:hover { border-color: #ef4444; transform: translateY(-2px); }
        .btn-primary { background: #ef4444; color: white; font-weight: 900; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.95); opacity: 0.8; }
        .tab-active { border-bottom: 4px solid #ef4444; color: #ef4444; font-weight: 900; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input, textarea { background: #0f172a !important; border: 1px solid #334155 !important; color: white !important; }
        input:focus { border-color: #ef4444 !important; outline: none; }
        .timer-glow { text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body class="pb-10">

    <div id="app" class="max-w-md mx-auto min-h-screen relative">
        <header class="sticky top-0 z-50 bg-[#0f172a]/80 backdrop-blur-md px-6 py-6 border-b border-slate-800 text-center">
            <h1 class="text-3xl font-black tracking-tighter italic text-red-500">COMMANDER SHOP</h1>
            <p id="warehouse-name" class="text-[10px] text-slate-500 font-bold tracking-[0.3em] uppercase mt-1">GUMI MAIN BASE</p>
            
            <div id="timer-box" class="mt-4 p-3 rounded-2xl bg-slate-900 border border-slate-800 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <i data-lucide="timer" class="w-4 h-4 text-red-500 animate-pulse"></i>
                    <span id="session-status" class="text-[10px] font-black uppercase text-slate-400">Standby</span>
                </div>
                <span id="timer-display" class="text-xl font-black font-mono text-red-500 timer-glow">00:00:00</span>
            </div>
            <button onclick="openLogin()" class="absolute top-6 right-4 text-slate-600 hover:text-red-500 transition-colors"><i data-lucide="shield-check" class="w-6 h-6"></i></button>
        </header>

        <nav class="flex border-b border-slate-800 mb-6 bg-slate-900/50">
            <button onclick="switchTab('shop')" id="tab-shop" class="flex-1 py-4 text-xs font-bold uppercase tracking-widest tab-active">Supply List</button>
            <button onclick="switchTab('lookup')" id="tab-lookup" class="flex-1 py-4 text-xs font-bold uppercase tracking-widest text-slate-500">My Order</button>
        </nav>

        <main id="content-area" class="px-4 space-y-6">
            <!-- Content will be injected here -->
        </main>

        <div id="notification" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] hidden animate-bounce">
            <div class="bg-red-600 text-white px-8 py-4 rounded-full font-black shadow-2xl flex items-center gap-3 border-2 border-red-400">
                <i data-lucide="bell" class="w-4 h-4"></i>
                <span id="notif-msg" class="text-sm">사령부 보고 완료</span>
            </div>
        </div>
    </div>

    <script>
        // 사령관님께서 제공해주신 구글 앱스 스크립트 웹앱 주소
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzIxfrKTMPPpT1TNzjuR4rEOnbK_o9lrb5ZN2rvVBz5goOohPJmjLaSzMA5cnTi1UPy/exec";

        let state = {
            view: 'customer',
            tab: 'shop',
            products: [],
            orders: [],
            isLive: false,
            startTime: null,
            duration: 4 * 3600000,
            adminKey: '1234',
            accountInfo: { bank: '카카오뱅크', num: '1234-56-7890', holder: '홍길동' }
        };

        // 초기 데이터 로드
        async function init() {
            loadLocalData();
            await fetchProducts();
            startTimer();
            render();
            lucide.createIcons();
        }

        function loadLocalData() {
            const saved = localStorage.getItem('commander_state');
            if (saved) {
                const parsed = JSON.parse(saved);
                state = { ...state, ...parsed };
            }
        }

        function saveLocalData() {
            localStorage.setItem('commander_state', JSON.stringify(state));
        }

        async function fetchProducts() {
            try {
                // GAS에서 상품 목록을 가져오기 위한 GET 요청
                const res = await fetch(GAS_URL);
                const data = await res.json();
                if (data && data.length > 0) {
                    state.products = data;
                    render();
                }
            } catch (e) {
                console.log("GAS Data fetch error, using local storage");
            }
        }

        async function syncGAS(payload, type) {
            try {
                // no-cors 모드는 응답을 읽을 수 없지만 데이터 전송은 성공함
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ ...payload, type: type, timestamp: new Date().toLocaleString() })
                });
            } catch (e) {
                console.error("GAS Sync Error", e);
            }
        }

        function switchTab(tab) {
            state.tab = tab;
            const tabs = ['shop', 'lookup'];
            tabs.forEach(t => {
                document.getElementById(`tab-${t}`).className = t === tab ? 
                "flex-1 py-4 text-xs font-bold uppercase tracking-widest tab-active" : 
                "flex-1 py-4 text-xs font-bold uppercase tracking-widest text-slate-500";
            });
            render();
        }

        function render() {
            const area = document.getElementById('content-area');
            if (state.view === 'customer') {
                area.innerHTML = state.tab === 'shop' ? renderShop() : renderLookup();
            } else {
                area.innerHTML = renderAdmin();
            }
            lucide.createIcons();
        }

        function renderShop() {
            if (state.products.length === 0) return `<div class="py-20 text-center text-slate-600 font-bold">보급 창고가 비어있습니다.</div>`;
            return state.products.map(p => {
                const imgUrl = `https://gogojin-kkj.github.io/-/images/${p.name}.jpg`;
                return `
                <div class="commander-card">
                    <img src="${imgUrl}" class="w-full h-80 object-cover bg-slate-800" onerror="this.src='https://placehold.co/600x600/0f172a/ef4444?text=COMMANDER+SUPPLY';">
                    <div class="p-6">
                        <div class="flex justify-between items-start">
                            <h3 class="text-xl font-black">${p.name}</h3>
                            <span class="text-[10px] bg-red-500/20 text-red-500 px-2 py-1 rounded font-bold">${p.category || 'GENERAL'}</span>
                        </div>
                        <p class="text-2xl font-black text-red-500 mt-2">${Number(p.price).toLocaleString()}원</p>
                        <div class="flex gap-2 mt-4">
                            ${p.sizes ? p.sizes.split(',').map(s => `<span class="bg-slate-900 px-3 py-2 rounded-xl text-[10px] font-bold border border-slate-700">${s}</span>`).join('') : ''}
                        </div>
                        <button onclick="orderSupply('${p.name}', ${p.price})" class="w-full mt-6 py-4 btn-primary rounded-2xl text-sm tracking-widest uppercase shadow-lg shadow-red-900/20">Order Supply</button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function renderLookup() {
            return `
            <div class="bg-slate-900 p-8 rounded-[32px] border border-slate-800 space-y-4 text-center">
                <h3 class="text-xl font-black text-red-500 italic uppercase">Order Tracking</h3>
                <p class="text-[10px] text-slate-500 font-bold">입금자명을 입력하여 보급 현황을 확인하십시오.</p>
                <input id="lookup-name" placeholder="실명 입력" class="w-full p-5 rounded-2xl text-center font-bold text-lg" />
                <button onclick="performLookup()" class="w-full p-5 btn-primary rounded-2xl font-black uppercase tracking-widest">Identify</button>
            </div>
            <div id="lookup-results" class="space-y-4"></div>
            `;
        }

        function renderAdmin() {
            return `
            <div class="space-y-8 animate-in fade-in duration-500">
                <div class="flex justify-between items-center border-b border-slate-800 pb-4">
                    <h2 class="text-2xl font-black text-red-500 italic uppercase">Command Center</h2>
                    <button onclick="state.view='customer'; render();" class="text-xs font-bold text-slate-500 border border-slate-700 px-4 py-2 rounded-xl">Exit</button>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-900 p-6 rounded-[32px] border-2 border-dashed border-slate-800 text-center">
                        <p class="text-[10px] text-slate-500 font-bold mb-2 uppercase">Live Session</p>
                        <button onclick="toggleLive()" class="w-full py-4 rounded-2xl font-black ${state.isLive ? 'bg-red-600' : 'bg-green-600'} text-white">
                            ${state.isLive ? 'STOP LIVE' : 'START LIVE'}
                        </button>
                    </div>
                    <div class="bg-slate-900 p-6 rounded-[32px] border border-slate-800 text-center">
                        <p class="text-[10px] text-slate-500 font-bold mb-2 uppercase tracking-widest">Total Orders</p>
                        <span class="text-4xl font-black italic text-red-500">${state.orders.length}</span>
                    </div>
                </div>

                <div class="bg-slate-900 p-8 rounded-[40px] border border-slate-800 space-y-4">
                    <h3 class="font-black text-sm uppercase text-slate-400 tracking-widest">Register Supply</h3>
                    <input id="new-name" placeholder="상품명" class="w-full p-4 rounded-xl" />
                    <input id="new-price" type="number" placeholder="가격" class="w-full p-4 rounded-xl" />
                    <input id="new-category" placeholder="카테고리" class="w-full p-4 rounded-xl" />
                    <input id="new-sizes" placeholder="사이즈 (S, M, L)" class="w-full p-4 rounded-xl" />
                    <button onclick="adminAddProduct()" class="w-full py-5 btn-primary rounded-2xl font-black uppercase">Add to Supply</button>
                </div>
            </div>
            `;
        }

        function showNotif(msg) {
            const n = document.getElementById('notification');
            document.getElementById('notif-msg').innerText = msg;
            n.classList.remove('hidden');
            setTimeout(() => n.classList.add('hidden'), 3000);
        }

        function openLogin() {
            const pw = prompt("관리자 인증 암호를 입력하십시오.");
            if (pw === state.adminKey) {
                state.view = 'admin';
                render();
            } else {
                showNotif("인증 실패: 접근 권한이 없습니다.");
            }
        }

        function toggleLive() {
            state.isLive = !state.isLive;
            state.startTime = state.isLive ? Date.now() : null;
            saveLocalData();
            render();
            showNotif(state.isLive ? "라이브 작전 개시" : "작전 종료");
        }

        function adminAddProduct() {
            const name = document.getElementById('new-name').value;
            const price = document.getElementById('new-price').value;
            const category = document.getElementById('new-category').value;
            const sizes = document.getElementById('new-sizes').value;

            if (!name || !price) return showNotif("필수 제원을 입력하십시오.");

            const product = { name, price, category, sizes };
            state.products.unshift(product);
            saveLocalData();
            syncGAS(product, 'ADD_PRODUCT');
            showNotif("보급 품목 등록 완료");
            render();
        }

        function orderSupply(name, price) {
            if (!state.isLive) return showNotif("현재 보급 시간이 아닙니다.");
            
            const tiktokId = prompt("틱톡 아이디를 입력하십시오.");
            const customerName = prompt("송금하실 실명을 입력하십시오.");

            if (!tiktokId || !customerName) return showNotif("정보 미입력 시 보급 불가");

            const order = {
                name: customerName,
                tiktokId: tiktokId,
                items: [name],
                totalAmount: price,
                timestamp: Date.now()
            };

            state.orders.unshift(order);
            saveLocalData();
            syncGAS(order, 'NEW_ORDER');
            showNotif("사령부에 주문이 접수되었습니다.");
            
            state.tab = 'lookup';
            render();
            setTimeout(() => {
                document.getElementById('lookup-name').value = customerName;
                performLookup();
            }, 100);
        }

        function performLookup() {
            const name = document.getElementById('lookup-name').value;
            const results = state.orders.filter(o => o.name === name);
            const container = document.getElementById('lookup-results');
            
            if (results.length === 0) {
                container.innerHTML = `<div class="py-10 text-center text-slate-500 font-bold uppercase">No Intelligence Found</div>`;
                return;
            }

            container.innerHTML = results.map(o => `
                <div class="commander-card p-6 border-l-4 border-l-red-500">
                    <div class="flex justify-between mb-4">
                        <span class="text-xs font-black text-slate-500 uppercase tracking-widest">Pending Payment</span>
                        <span class="text-lg font-black text-red-500">${o.totalAmount.toLocaleString()}원</span>
                    </div>
                    <div class="space-y-1 text-sm font-bold text-slate-300">
                        ${o.items.map(it => `<div>• ${it}</div>`).join('')}
                    </div>
                    <div class="mt-6 bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-2">
                        <div class="flex justify-between text-[11px] font-black uppercase text-slate-500">
                            <span>Account</span>
                            <span onclick="copyAccount('${state.accountInfo.num}')" class="text-red-500 underline cursor-pointer">Copy</span>
                        </div>
                        <div class="text-sm font-black">${state.accountInfo.bank} / ${state.accountInfo.num}</div>
                        <div class="text-[10px] text-slate-500">예금주: ${state.accountInfo.holder}</div>
                    </div>
                    <p class="text-[9px] text-red-500 font-black mt-4 uppercase leading-relaxed tracking-tighter">※ 방송 종료 전까지 미입금 시 보급 작전은 자동 취소됩니다.</p>
                </div>
            `).join('');
        }

        function copyAccount(num) {
            const el = document.createElement('textarea');
            el.value = num;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showNotif("계좌번호 복사 완료");
        }

        function startTimer() {
            setInterval(() => {
                if (state.isLive && state.startTime) {
                    const elapsed = Date.now() - state.startTime;
                    const remaining = Math.max(0, state.duration - elapsed);
                    document.getElementById('timer-display').innerText = formatTime(remaining);
                    document.getElementById('session-status').innerText = "Live Order In Progress";
                    if (remaining === 0 && state.isLive) {
                        toggleLive();
                    }
                } else {
                    document.getElementById('timer-display').innerText = "00:00:00";
                    document.getElementById('session-status').innerText = "Base Standby";
                }
            }, 1000);
        }

        window.onload = init;
    </script>
</body>
</html>
