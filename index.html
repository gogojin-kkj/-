<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사령관의 라이브 마켓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background-color: #f4f4f9; color: #333; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .commander-header { background: #111; color: #fff; border-bottom: 4px solid #e74c3c; }
        .product-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: transform 0.2s; border: 1px solid #eee; }
        .product-card:active { transform: scale(0.98); }
        .active-tab { background-color: #111; color: white; shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .inactive-tab { background-color: white; color: #94a3b8; border: 1px solid #e2e8f0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input, textarea { border: 2px solid #f1f5f9; transition: all 0.2s; }
        input:focus, textarea:focus { border-color: #e74c3c; outline: none; background: white; }
    </style>
</head>
<body class="bg-slate-50">

    <div id="app" class="min-h-screen">
        <div id="loading-screen" class="fixed inset-0 z-[200] bg-white flex flex-col items-center justify-center p-6 text-center">
            <div class="relative">
                <div class="w-16 h-16 border-4 border-slate-100 border-t-slate-900 rounded-full animate-spin"></div>
                <i data-lucide="shield-check" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-slate-900 w-6 h-6"></i>
            </div>
            <div id="status-container" class="mt-6">
                <p id="status-text" class="font-black text-slate-400 animate-pulse tracking-tighter uppercase">Initializing Command Center...</p>
                <div id="error-guide" class="hidden mt-4 text-sm text-red-500 bg-red-50 p-4 rounded-2xl border border-red-100 max-w-xs mx-auto">
                    <p class="font-bold mb-1 text-xs">통신 오류 발생</p>
                    <p class="text-[10px] leading-relaxed text-slate-600">Firebase 인증 및 보안 규칙을 확인하십시오.</p>
                </div>
            </div>
        </div>

        <div id="main-content"></div>

        <div id="notification-container" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[300] hidden">
            <div id="notification-box" class="flex items-center gap-3 px-8 py-4 rounded-full shadow-2xl bg-slate-900 text-white border border-slate-700 animate-fade-in">
                <i data-lucide="bell" class="w-4 h-4 text-yellow-400"></i>
                <span id="notification-msg" class="font-bold text-sm"></span>
            </div>
        </div>
    </div>

    <script>
        // 구글 앱스 스크립트 웹 앱 URL (제공해주신 주소 적용)
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzIxfrKTMPPpT1TNzjuR4rEOnbK_o9lrb5ZN2rvVBz5goOohPJmjLaSzMA5cnTi1UPy/exec";

        const firebaseConfig = {
            apiKey: "본인의_API_KEY",
            authDomain: "본인의_PROJECT_ID.firebaseapp.com",
            projectId: "본인의_PROJECT_ID",
            storageBucket: "본인의_PROJECT_ID.appspot.com",
            messagingSenderId: "본인의_SENDER_ID",
            appId: "본인의_APP_ID"
        };

        const APP_ID = "tiktok-commander-shop";
        let db, auth;

        let state = {
            view: 'customer',
            customerTab: 'shop',
            marketId: 'default-warehouse',
            marketName: '기본 보급소',
            products: [],
            orders: [],
            registeredMarkets: [],
            marketSettings: { bankName: '카카오뱅크', accountNum: '', accountHolder: '', isLiveActive: false, liveStartTime: null, liveDurationMs: 4 * 3600000, adminKey: '1234' },
            selectedSizes: {},
            lookupInfo: { name: '', phone: '' },
            hasSearched: false,
            timeLeft: 0
        };

        function initApp() {
            try {
                if (firebaseConfig.apiKey.includes("본인의_")) {
                    showError("Firebase 설정이 필요합니다.");
                    return;
                }
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                auth = firebase.auth();

                auth.signInAnonymously().then(() => setupListeners()).catch(err => showError("인증 오류: " + err.code));
            } catch (err) { showError("초기화 오류"); }
        }

        function showError(msg) {
            document.getElementById('status-text').innerText = msg;
            document.getElementById('error-guide').classList.remove('hidden');
        }

        function setupListeners() {
            db.collection('artifacts').doc(APP_ID).collection('warehouses').onSnapshot(snap => {
                state.registeredMarkets = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                const curr = state.registeredMarkets.find(m => m.marketId === state.marketId);
                if (curr) state.marketName = curr.name;
                render();
            });

            db.collection('artifacts').doc(APP_ID).collection(`${state.marketId}_products`).onSnapshot(snap => {
                state.products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                document.getElementById('loading-screen').classList.add('hidden');
                render();
            });

            db.collection('artifacts').doc(APP_ID).collection(`${state.marketId}_orders`).onSnapshot(snap => {
                state.orders = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
                render();
            });

            db.collection('artifacts').doc(APP_ID).collection('configs').doc(state.marketId).onSnapshot(doc => {
                if (doc.exists) state.marketSettings = { ...state.marketSettings, ...doc.data() };
                render();
            });
        }

        // 구글 시트로 데이터를 전송하는 핵심 함수
        async function syncWithGoogleSheets(data, type) {
            if (!GAS_URL || GAS_URL.includes("복사한_URL")) return;
            try {
                const payload = {
                    ...data,
                    type: type,
                    warehouse: state.marketName,
                    timestamp: new Date().toLocaleString('ko-KR')
                };
                // no-cors 모드는 응답을 읽을 수 없지만 데이터 전송은 가능합니다.
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                console.log(`Sync complete: ${type}`);
            } catch (err) {
                console.error('GAS Sync Error:', err);
            }
        }

        function notify(msg, type = 'info') {
            const box = document.getElementById('notification-container');
            document.getElementById('notification-msg').innerText = msg;
            box.classList.remove('hidden');
            setTimeout(() => box.classList.add('hidden'), 3000);
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            notify("계좌번호 복사 완료!");
        }

        function render() {
            const content = document.getElementById('main-content');
            if (state.view === 'customer') content.innerHTML = renderCustomerView();
            else if (state.view === 'admin') content.innerHTML = renderAdminView();
            else if (state.view === 'login') content.innerHTML = renderLoginView();
            lucide.createIcons();
        }

        function renderCustomerView() {
            const isLive = state.marketSettings.isLiveActive && state.timeLeft > 0;
            return `
                <div class="max-w-md mx-auto pb-32 animate-fade-in">
                    <header class="commander-header sticky top-0 z-40 px-6 py-6 text-center shadow-xl">
                        <h1 class="text-2xl font-black tracking-tighter mb-1 uppercase">COMMANDER SHOP</h1>
                        <p class="text-[10px] text-slate-400 font-bold tracking-[0.2em]">${state.marketName}</p>
                        <div class="mt-4 p-3 rounded-xl flex items-center justify-between transition-all ${isLive ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-500'}">
                            <div class="flex items-center gap-2"><i data-lucide="timer" class="w-4 h-4"></i><span class="text-[10px] font-black uppercase">${isLive ? 'ORDER CLOSING' : 'PREPARING'}</span></div>
                            <span class="text-xl font-black font-mono">${formatTime(state.timeLeft)}</span>
                        </div>
                        <button onclick="state.view='login'; render();" class="absolute top-6 right-4 text-slate-500 hover:text-white"><i data-lucide="lock" class="w-5 h-5"></i></button>
                    </header>

                    <div class="flex p-4 gap-2">
                        <button onclick="state.customerTab='shop'; render();" class="flex-1 py-4 rounded-2xl font-black text-xs uppercase tracking-widest ${state.customerTab === 'shop' ? 'active-tab' : 'inactive-tab'}">Supply List</button>
                        <button onclick="state.customerTab='lookup'; render();" class="flex-1 py-4 rounded-2xl font-black text-xs uppercase tracking-widest ${state.customerTab === 'lookup' ? 'active-tab' : 'inactive-tab'}">My Orders</button>
                    </div>

                    <div class="px-4 space-y-6">
                        ${state.customerTab === 'shop' ? renderProductList() : renderLookup()}
                    </div>
                </div>
            `;
        }

        function renderProductList() {
            if (state.products.length === 0) return `<div class="py-20 text-center text-slate-300 font-bold uppercase tracking-widest">No Supplies Available</div>`;
            return state.products.map(p => {
                const fallbackImg = `https://gogojin-kkj.github.io/-/images/${p.name}.jpg`;
                const displayImg = (p.imageUrls && p.imageUrls[0]) ? p.imageUrls[0] : fallbackImg;
                
                return `
                <div class="product-card">
                    <img src="${displayImg}" class="w-full h-80 object-cover bg-slate-100" onerror="this.src='https://placehold.co/600x600/111/fff?text=COMMANDER+SUPPLY';">
                    <div class="p-6 space-y-4">
                        <div>
                            <div class="flex justify-between items-start">
                                <h3 class="text-xl font-black text-slate-900">${p.name}</h3>
                                <span class="text-xs font-black text-red-600">${p.category || 'GENERAL'}</span>
                            </div>
                            <p class="text-2xl font-black mt-1 text-slate-900">${(p.price || 0).toLocaleString()}원</p>
                            ${p.chestWidth ? `<p class="text-[11px] font-bold text-slate-400 mt-1 flex items-center gap-1"><i data-lucide="scissors" class="w-3 h-3"></i> 가단: ${p.chestWidth}cm</p>` : ''}
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            ${(p.sizes || []).map(s => `
                                <button onclick="state.selectedSizes['${p.id}']='${s}'; render();" class="py-3 rounded-xl border-2 text-[10px] font-black transition-all ${state.selectedSizes[p.id] === s ? 'border-red-600 bg-red-50 text-red-600 shadow-md' : 'border-slate-100 text-slate-400'}">${s}</button>
                            `).join('')}
                        </div>
                        <button onclick="addToCart('${p.id}')" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-sm uppercase tracking-widest active:scale-95 transition-transform">Add to Cart</button>
                    </div>
                </div>
            `}).join('');
        }

        function addToCart(pid) {
            const isLive = state.marketSettings.isLiveActive && state.timeLeft > 0;
            if (!isLive) { notify("방송 중에만 주문이 가능합니다.", "error"); return; }
            
            const product = state.products.find(p => p.id === pid);
            const size = state.selectedSizes[pid];
            if (!size) { notify("사이즈를 선택하십시오.", "error"); return; }
            
            const tiktokId = prompt("틱톡 아이디를 입력하십시오. (추적용)");
            const customerName = prompt("입금자 실명을 입력하십시오. (필수)");
            
            if (!tiktokId || !customerName) { notify("정보를 모두 입력해야 보급이 가능합니다.", "error"); return; }

            const orderData = {
                name: customerName, tiktokId, items: [`${product.name}(${size})`], totalAmount: product.price, status: 'pending', timestamp: Date.now()
            };

            // Firebase 저장
            db.collection('artifacts').doc(APP_ID).collection(`${state.marketId}_orders`).add(orderData).then(() => {
                notify("주문서가 사령부에 접수되었습니다.");
                // 구글 시트 동기화 실행
                syncWithGoogleSheets(orderData, 'NEW_ORDER');
                
                state.view = 'customer';
                state.customerTab = 'lookup';
                state.lookupInfo.name = customerName;
                state.hasSearched = true;
                render();
            });
        }

        function renderAdminView() {
            return `
                <div class="max-w-4xl mx-auto p-4 md:p-10 space-y-8 animate-fade-in text-slate-900">
                    <header class="flex justify-between items-center border-b-2 border-slate-900 pb-6">
                        <h1 class="text-3xl font-black tracking-tighter italic">COMMAND CENTER</h1>
                        <button onclick="state.view='customer'; render();" class="px-6 py-3 bg-slate-900 text-white rounded-xl font-bold uppercase text-xs tracking-widest">Client Mode</button>
                    </header>
                    <div class="grid md:grid-cols-2 gap-6">
                        <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100 text-center">
                            <p class="text-slate-400 font-bold uppercase text-[10px] mb-2">Live Session</p>
                            ${!state.marketSettings.isLiveActive ? `
                                <button onclick="toggleLive(true)" class="w-full py-6 bg-green-500 text-white rounded-3xl font-black text-xl shadow-xl">START LIVE</button>
                            ` : `
                                <button onclick="toggleLive(false)" class="w-full py-6 bg-red-600 text-white rounded-3xl font-black text-xl shadow-xl">STOP LIVE</button>
                            `}
                        </div>
                        <div class="bg-white p-8 rounded-[3rem] border border-slate-100 space-y-4">
                            <p class="text-slate-400 font-bold uppercase text-[10px]">Add Product</p>
                            <input id="new-p-name" placeholder="상품명" class="w-full p-4 bg-slate-50 rounded-xl" />
                            <input id="new-p-price" type="number" placeholder="가격" class="w-full p-4 bg-slate-50 rounded-xl" />
                            <button onclick="adminAddProduct()" class="w-full py-4 bg-slate-900 text-white rounded-xl font-black">REGISTER ITEM</button>
                        </div>
                    </div>
                </div>
            `;
        }

        async function adminAddProduct() {
            const name = document.getElementById('new-p-name').value;
            const price = Number(document.getElementById('new-p-price').value);
            if (!name || !price) return notify("정보를 입력하세요.");

            const productData = { name, price, sizes: ['FREE'], timestamp: Date.now() };
            await db.collection('artifacts').doc(APP_ID).collection(`${state.marketId}_products`).add(productData);
            
            // 구글 시트 동기화 실행
            syncWithGoogleSheets(productData, 'ADD_PRODUCT');
            
            notify("상품 등록 및 구글 시트 기록 완료");
            document.getElementById('new-p-name').value = '';
            document.getElementById('new-p-price').value = '';
        }

        function toggleLive(active) {
            db.collection('artifacts').doc(APP_ID).collection('configs').doc(state.marketId).update({
                isLiveActive: active, liveStartTime: active ? Date.now() : null
            }).then(() => notify(active ? "방송 시작" : "방송 종료"));
        }

        function formatTime(ms) {
            if (!ms || ms < 0) return "00:00:00";
            const h = Math.floor(ms / 3600000);
            const m = Math.floor((ms % 3600000) / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        window.onload = initApp;

        setInterval(() => {
            if (state.marketSettings.isLiveActive && state.marketSettings.liveStartTime) {
                const now = Date.now();
                state.timeLeft = Math.max(0, state.marketSettings.liveDurationMs - (now - state.marketSettings.liveStartTime));
                const timerEl = document.querySelector('.font-mono');
                if (timerEl) timerEl.innerText = formatTime(state.timeLeft);
            } else {
                state.timeLeft = 0;
            }
        }, 1000);

        function renderLookup() {
            return `
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-4 text-center">
                    <i data-lucide="user-search" class="mx-auto text-red-600 w-10 h-10"></i>
                    <h3 class="font-black text-xl uppercase tracking-tighter">Order Tracking</h3>
                    <input id="lookup-name" placeholder="입금자 실명" class="w-full p-4 bg-slate-50 rounded-2xl outline-none text-center font-bold" value="${state.lookupInfo.name}" />
                    <button onclick="state.lookupInfo.name = document.getElementById('lookup-name').value; state.hasSearched=true; render();" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black uppercase tracking-widest shadow-xl">Confirm</button>
                </div>
                ${state.hasSearched ? '<div class="space-y-4 mt-6">' + renderLookupResults() + '</div>' : ''}
            `;
        }

        function renderLookupResults() {
            const found = state.orders.filter(o => o.name === state.lookupInfo.name);
            if (found.length === 0) return `<div class="py-10 text-center text-slate-300 font-bold uppercase">No records found.</div>`;
            return found.map(o => `
                <div class="bg-white p-6 rounded-[2rem] border-2 ${o.status === 'paid' ? 'border-green-100' : 'border-red-50'} shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${o.status === 'paid' ? 'bg-green-500 text-white' : 'bg-red-600 text-white'}">${o.status === 'paid' ? 'Verified' : 'Pending'}</span>
                        <span class="font-black text-lg">${(o.totalAmount || 0).toLocaleString()}원</span>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-xl space-y-1 mb-4 text-xs font-bold text-slate-600">
                        ${(o.items || []).map(it => `<div>• ${it}</div>`).join('')}
                    </div>
                    ${o.status === 'pending' ? `
                        <div class="bg-[#FEE500]/10 p-4 rounded-xl border border-[#FEE500] space-y-3 mb-2 text-center">
                            <p class="text-[11px] font-black text-slate-400">카카오뱅크 / ${state.marketSettings.accountNum}</p>
                            <p class="text-xs font-black">예금주: ${state.marketSettings.accountHolder}</p>
                            <button onclick="copyToClipboard('${state.marketSettings.accountNum}')" class="w-full py-3 bg-slate-900 text-white rounded-xl text-xs font-black shadow-lg">계좌번호 복사</button>
                            <p class="text-[9px] text-red-600 font-black mt-2 leading-relaxed">※ 방송 종료 전까지 미입금 시 자동 취소됩니다.</p>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function renderLoginView() {
            return `
                <div class="h-screen flex items-center justify-center bg-slate-900 p-6">
                    <div class="w-full max-w-sm bg-white rounded-[3rem] p-10 shadow-2xl text-center space-y-8">
                        <i data-lucide="shield-alert" class="w-16 h-16 text-red-600 mx-auto"></i>
                        <h2 class="text-2xl font-black uppercase italic">Access Denied</h2>
                        <input type="password" id="admin-pw" placeholder="PASSWORD" class="w-full p-5 bg-slate-100 rounded-2xl text-center text-3xl font-black outline-none focus:ring-4 focus:ring-red-100" />
                        <div class="flex gap-2">
                            <button onclick="state.view='customer'; render();" class="flex-1 py-4 font-bold text-slate-400">Back</button>
                            <button onclick="handleLogin()" class="flex-[2] py-4 bg-slate-900 text-white rounded-2xl font-black shadow-lg">Authenticate</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function handleLogin() {
            if (document.getElementById('admin-pw').value === state.marketSettings.adminKey) { state.view = 'admin'; render(); } 
            else notify("암호가 일치하지 않습니다.", "error");
        }
    </script>
</body>
</html>
